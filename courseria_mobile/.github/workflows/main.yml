name: Flutter APK (Cached Gradle)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.internal.http.socketTimeout=600000 -Dorg.gradle.internal.http.connectionTimeout=600000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      - name: Cache Gradle distribution
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper/dists
          key: gradle-dist-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-9
          key: gradle-deps-${{ hashFiles('android/build.gradle', 'android/app/build.gradle') }}

      - name: Build APK
        run: flutter build apk --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: build/app/outputs/flutter-apk/*.apk
